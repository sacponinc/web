<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>グルメキャッチ - 落ちものゲームの決定版！ | Sacpon</title>
    <link rel="icon" href="images/logo_catch.png">
    <meta
      name="description"
      content="落ちてくるアイテムをキャッチして高得点を目指す、Sacponの爽快カジュアルゲーム。無料ですぐに遊べます。"
    >
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: #0098f7;
        color: #fff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      }

      a {
        color: inherit;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: linear-gradient(180deg, #075ee8 0%, #034ac7 100%);
        box-shadow: 0 4px 0 rgba(0, 27, 100, 0.22);
      }

      .header-inner {
        width: min(100%, 793px);
        min-height: 72px;
        margin: 0 auto;
        padding: 8px clamp(14px, 3vw, 28px);
        display: flex;
        align-items: center;
        gap: clamp(14px, 3vw, 28px);
      }

      .logo {
        display: block;
        width: clamp(128px, 21vw, 176px);
        height: auto;
        filter: drop-shadow(0 3px 0 rgba(0, 0, 0, 0.18));
      }

      .nav {
        display: flex;
        align-items: center;
        gap: clamp(14px, 3vw, 30px);
        margin-left: auto;
        font-size: clamp(0.72rem, 1.6vw, 0.95rem);
        font-weight: 800;
        text-shadow: 0 2px 0 rgba(0, 18, 78, 0.35);
        white-space: nowrap;
      }

      .nav a {
        text-decoration: none;
      }

      .play-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 14px;
        background: linear-gradient(180deg, #fff36a 0%, #ffd51f 48%, #ffad00 100%);
        color: #1b1400;
        box-shadow:
          inset 0 3px 0 rgba(255, 255, 255, 0.68),
          0 5px 0 #d57a00;
        font-weight: 900;
        text-decoration: none;
        text-shadow: none;
      }

      .lp {
        width: min(100%, 793px);
        margin: 0 auto;
        background: #11b9ff;
        box-shadow: 0 0 34px rgba(0, 37, 115, 0.2);
      }

      .slice {
        position: relative;
      }

      .slice img {
        display: block;
        width: 100%;
        height: auto;
      }

      .hotspot {
        position: absolute;
        display: block;
        overflow: hidden;
        white-space: nowrap;
        text-indent: 100%;
      }

      .hero-play {
        left: 13%;
        bottom: 2%;
        width: 74%;
        height: 9%;
      }

      .footer {
        width: min(100%, 793px);
        margin: 0 auto;
        padding: 22px clamp(16px, 4vw, 32px) 28px;
        display: flex;
        align-items: center;
        gap: 18px;
        background: #063277;
        color: #fff;
      }

      .footer .logo {
        width: 112px;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px 20px;
        margin-left: auto;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .footer-links a {
        text-decoration: none;
      }

      @media (max-width: 640px) {
        .site-header {
          position: relative;
        }

        .header-inner {
          min-height: 58px;
          padding-inline: 10px;
        }

        .logo {
          width: 108px;
        }

        .nav {
          display: none;
        }

        .play-button {
          min-height: 38px;
          padding: 0 10px;
          border-radius: 12px;
          font-size: 0.78rem;
        }

        .footer {
          align-items: flex-start;
          flex-direction: column;
        }

        .footer-links {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="#top" aria-label="トップへ">
          <img class="logo" src="images/logo_catch.png" alt="落ちものゲームの決定版！">
        </a>
        <nav class="nav" aria-label="主要ナビゲーション">
          <a href="#game">ゲーム紹介</a>
          <a href="#ability">特殊能力</a>
          <a href="#ranking">ランキング</a>
          <a href="#collection">コレクション</a>
          <a class="play-button" href="https://apps.apple.com/jp/app/id6768644210" target="_blank" rel="noopener noreferrer">今すぐプレイ！</a>
        </nav>
      </div>
    </header>

    <main id="top" class="lp">
      <section id="game" class="slice" aria-label="落ちものゲームの決定版">
        <span id="play"></span>
        <img src="images/1.png" alt="落ちものゲームの決定版！アイテムをキャッチして、高得点を目指せ！">
        <a class="hotspot hero-play" href="https://apps.apple.com/jp/app/id6768644210" target="_blank" rel="noopener noreferrer">今すぐプレイ</a>
      </section>

      <section id="ability" class="slice" aria-label="特殊能力">
        <img src="images/2.png" alt="キャラクターごとの特殊能力をつかってクリアを目指そう！">
      </section>

      <section id="ranking" class="slice" aria-label="オンラインランキング">
        <img src="images/3.png" alt="オンラインランキングも！全国のプレイヤーと競い合おう。">
      </section>

      <section id="collection" class="slice" aria-label="コレクション">
        <img src="images/4.png" alt="宝箱からお宝グルメをゲット！コレクションを完成させよう。">
      </section>
    </main>

    <footer class="footer">
      <img class="logo" src="images/logo_catch.png" alt="落ちものゲームの決定版！">
      <div class="footer-links">
        <a href="../privacy.html">プライバシーポリシー</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScSLxcjoz0HVZtbrANi4RboEEUwYdrgViC3aEMYsCoFnP1brw/viewform" target="_blank" rel="noopener noreferrer">お問い合わせ</a>
      </div>
    </footer>
  </body>
</html>
